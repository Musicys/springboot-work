<!doctype html>
<html>
   <head>
      <meta charset="utf-8" />
      <meta
         name="viewport"
         content="width=device-width, initial-scale=1.0, user-scalable=no" />
      <style>
         * {
            margin: 0;
            padding: 0;
         }
         html,
         body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
         }
         video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
         }
      </style>
   </head>
   <body>
      <video
         controls
         playsinline
         webkit-playsinline
         x5-video-player-type="h5"
         x5-video-player-fullscreen="true"></video>

      <script>
         (function () {
            const params = new URLSearchParams(window.location.search);
            const src = params.get('src');
            if (src) {
               document.querySelector('video').src = src;
            }
         })();
      </script>
   </body>
</html>
